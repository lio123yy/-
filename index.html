<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋联机对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .menu, .game {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
        }
        .hidden { display: none; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
        }
        input:focus {
            outline: 2px solid #f5576c;
        }
        .btn {
            width: 100%;
            padding: 15px 30px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-primary {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .room-code {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 10px;
            color: #f5576c;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .status {
            font-size: 1.2rem;
            margin: 15px 0;
            color: #aaa;
        }
        .players {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .player {
            padding: 15px 25px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .player.black { border: 2px solid #333; }
        .player.white { border: 2px solid #eee; }
        .player.active {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }
        #board {
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 1px;
            background: #d4a056;
            border: 3px solid #d4a056;
            border-radius: 5px;
            max-width: 500px;
            aspect-ratio: 1;
        }
        .cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        .cell:hover {
            background: rgba(255,255,255,0.1);
        }
        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            position: absolute;
        }
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            animation: fadeIn 0.3s ease;
            z-index: 1000;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .copy-btn {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #45a049;
        }
        .server-url {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        .server-url input {
            background: transparent;
            color: #4CAF50;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主菜单 -->
        <div id="menu" class="menu">
            <h1>五子棋联机对战</h1>
            <p style="color:#aaa;margin-bottom:20px;">与好友输入相同房间码即可对战</p>
            
            <div class="server-url">
                <label>服务器地址:</label>
                <input type="text" id="serverUrl" placeholder="ws://localhost:8000" value="">
            </div>
            
            <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="10">
            <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
            <div style="margin:15px 0;color:#888;">或</div>
            <input type="text" id="roomCode" placeholder="输入6位房间码" maxlength="6">
            <button class="btn btn-secondary" onclick="joinRoom()">加入房间</button>
        </div>

        <!-- 游戏界面 -->
        <div id="game" class="game hidden">
            <div class="room-code" id="displayRoomCode">000000</div>
            <button class="copy-btn" onclick="copyRoomCode()">复制房间码</button>
            
            <div class="players">
                <div class="player black" id="blackPlayer">
                    <div>黑方</div>
                    <div id="blackName">等待中...</div>
                </div>
                <div class="player white" id="whitePlayer">
                    <div>白方</div>
                    <div id="whiteName">等待中...</div>
                </div>
            </div>
            
            <div class="status" id="status">等待玩家加入...</div>
            
            <div id="board"></div>
            
            <button class="btn btn-secondary" onclick="restartGame()" id="restartBtn" style="display:none;">再来一局</button>
            <button class="btn btn-secondary" onclick="leaveRoom()" style="margin-top:10px;">离开房间</button>
        </div>
    </div>

    <div id="message" class="message hidden"></div>

    <script>
        // 全局变量
        let ws = null;
        let myRole = '';
        let playerId = '';
        let roomCode = '';
        let board = [];
        let gameStarted = false;
        let isMyTurn = false;
        let serverUrl = '';

        // 初始化棋盘
        function initBoard() {
            board = Array(15).fill(null).map(() => Array(15).fill(null));
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                for (let j = 0; j < 15; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.onclick = () => makeMove(i, j);
                    boardEl.appendChild(cell);
                }
            }
        }

        // 显示消息
        function showMessage(text) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.classList.remove('hidden');
            setTimeout(() => msgEl.classList.add('hidden'), 3000);
        }

        // 连接服务器
        function connect() {
            return new Promise((resolve, reject) => {
                const url = serverUrl + '/ws/' + roomCode;
                ws = new WebSocket(url);
                
                ws.onopen = () => resolve();
                ws.onerror = () => reject(new Error('连接服务器失败'));
                ws.onclose = () => {
                    showMessage('与服务器断开连接');
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
            });
        }

        // 处理服务器消息
        function handleMessage(data) {
            switch(data.type) {
                case 'joined':
                    playerId = data.playerId;
                    document.getElementById('blackName').textContent = data.blackPlayer || '等待中...';
                    document.getElementById('whiteName').textContent = data.whitePlayer || '等待中...';
                    if (data.role === 'black') {
                        myRole = 'black';
                        isMyTurn = true;
                        updateTurnStatus();
                    } else {
                        myRole = 'white';
                    }
                    break;
                    
                case 'player_joined':
                    document.getElementById('whiteName').textContent = data.playerName;
                    showMessage('玩家 ' + data.playerName + ' 加入了!');
                    gameStarted = true;
                    initBoard();
                    updateTurnStatus();
                    break;
                    
                case 'move':
                    placePiece(data.row, data.col, data.player);
                    if (data.player === myRole) {
                        isMyTurn = false;
                    } else {
                        isMyTurn = true;
                    }
                    updateTurnStatus();
                    break;
                    
                case 'game_over':
                    showMessage(data.winner === myRole ? '你赢了!' : '你输了!');
                    document.getElementById('restartBtn').style.display = 'block';
                    break;
                    
                case 'restart':
                    initBoard();
                    isMyTurn = (myRole === 'black');
                    updateTurnStatus();
                    document.getElementById('restartBtn').style.display = 'none';
                    break;
                    
                case 'player_left':
                    showMessage('有玩家离开了');
                    gameStarted = false;
                    document.getElementById('whiteName').textContent = '等待中...';
                    document.getElementById('status').textContent = '等待玩家加入...';
                    break;
                    
                case 'error':
                    showMessage(data.message);
                    break;
            }
        }

        // 落子
        function placePiece(row, col, role) {
            board[row][col] = role;
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            const piece = document.createElement('div');
            piece.className = 'piece ' + role;
            cell.appendChild(piece);
        }

        // 发送落子
        function makeMove(row, col) {
            if (!gameStarted || !isMyTurn || board[row][col]) return;
            
            ws.send(JSON.stringify({
                type: 'move',
                row: row,
                col: col
            }));
        }

        // 更新回合状态
        function updateTurnStatus() {
            const statusEl = document.getElementById('status');
            const blackEl = document.getElementById('blackPlayer');
            const whiteEl = document.getElementById('whitePlayer');
            
            blackEl.classList.remove('active');
            whiteEl.classList.remove('active');
            
            if (!gameStarted) {
                statusEl.textContent = '等待玩家加入...';
            } else if (isMyTurn) {
                statusEl.textContent = '轮到你了!';
                if (myRole === 'black') blackEl.classList.add('active');
                else whiteEl.classList.add('active');
            } else {
                statusEl.textContent = '等待对方落子...';
                if (myRole === 'black') whiteEl.classList.add('active');
                else blackEl.classList.add('active');
            }
        }

        // 创建房间
        async function createRoom() {
            const name = document.getElementById('playerName').value.trim() || '玩家';
            serverUrl = document.getElementById('serverUrl').value.trim();
            
            if (!serverUrl) {
                // 如果没有填写服务器地址，使用当前页面域名
                serverUrl = window.location.protocol === 'https:' 
                    ? 'wss://' + window.location.host 
                    : 'ws://' + window.location.host;
            }
            
            // 生成房间码
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            try {
                await connect();
                ws.send(JSON.stringify({ type: 'create', playerName: name }));
                showMenu();
                showGame();
                document.getElementById('displayRoomCode').textContent = roomCode;
                document.getElementById('blackName').textContent = name;
                initBoard();
            } catch(e) {
                showMessage('无法连接服务器: ' + e.message);
            }
        }

        // 加入房间
        async function joinRoom() {
            const name = document.getElementById('playerName').value.trim() || '玩家';
            const code = document.getElementById('roomCode').value.trim();
            serverUrl = document.getElementById('serverUrl').value.trim();
            
            if (!code) {
                showMessage('请输入房间码');
                return;
            }
            
            if (!serverUrl) {
                serverUrl = window.location.protocol === 'https:' 
                    ? 'wss://' + window.location.host 
                    : 'ws://' + window.location.host;
            }
            
            roomCode = code;
            
            try {
                await connect();
                ws.send(JSON.stringify({ type: 'join', playerName: name }));
                showMenu();
                showGame();
                document.getElementById('displayRoomCode').textContent = roomCode;
                document.getElementById('whiteName').textContent = name;
            } catch(e) {
                showMessage('无法连接服务器: ' + e.message);
            }
        }

        // 重新开始
        function restartGame() {
            ws.send(JSON.stringify({ type: 'restart' }));
        }

        // 离开房间
        function leaveRoom() {
            if (ws) {
                ws.send(JSON.stringify({ type: 'leave' }));
                ws.close();
            }
            showGame();
            showMenu();
        }

        // 复制房间码
        function copyRoomCode() {
            navigator.clipboard.writeText(roomCode);
            showMessage('房间码已复制!');
        }

        // 显示/隐藏界面
        function showMenu() {
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('game').classList.add('hidden');
        }
        function showGame() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        }

        // 页面加载时获取服务器地址
        window.onload = function() {
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            document.getElementById('serverUrl').placeholder = protocol + window.location.host;
        };
    </script>
</body>
</html>
